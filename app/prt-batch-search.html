<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RetiFlux™ · Advanced Batch Search</title>
  <link rel="icon" href="../favicon.png" type="image/png">
  <style>
    :root { --bg:#020617; --card:#0f172a; --muted:#94a3b8; --txt:#e2e8f0; --gold:#f0c040; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Consolas, "Courier New", monospace; background:radial-gradient(circle at top,#1e293b 0%,#020617 45%); color:var(--txt); }
    .wrap { max-width:1280px; margin:0 auto; padding:20px 14px 40px; }
    .top { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:14px; }
    .home { color:var(--gold); text-decoration:none; border:1px solid rgba(240,192,64,.35); border-radius:10px; padding:8px 12px; }
    .title { font-size:1.2rem; color:var(--gold); font-weight:800; letter-spacing:.3px; }
    .card { background:rgba(15,23,42,.92); border:1px solid rgba(240,192,64,.22); border-radius:14px; padding:12px; margin-bottom:12px; }
    .filters { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:10px; }
    label { display:block; font-size:.7rem; color:#cbd5e1; margin-bottom:4px; text-transform:uppercase; letter-spacing:.5px; }
    input, select { width:100%; padding:9px; border-radius:8px; border:1px solid #334155; background:#0b1220; color:#e2e8f0; font-family:inherit; }
    .actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    button { padding:9px 12px; border-radius:8px; border:0; font-family:inherit; cursor:pointer; font-weight:700; }
    .btn-main { background:linear-gradient(135deg,#f59e0b,#d97706); color:#0f172a; }
    .btn-soft { background:#1e293b; color:#cbd5e1; border:1px solid #334155; }
    .status { font-size:.78rem; color:var(--muted); min-height:1.2em; margin-top:8px; }
    .table-wrap { overflow:auto; }
    table { width:100%; border-collapse:collapse; min-width:1100px; }
    th, td { border-bottom:1px solid rgba(148,163,184,.2); padding:8px; font-size:.73rem; text-align:left; white-space:nowrap; }
    th { color:#fbbf24; font-size:.68rem; text-transform:uppercase; letter-spacing:.6px; background:rgba(2,6,23,.65); position:sticky; top:0; }
    .void { color:#f87171; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="title">Advanced Batch Search</div>
      <a class="home" href="prt-create-form.html">← Back to Create PRT</a>
    </div>

    <div class="card">
      <div class="filters">
        <div><label for="fFrom">From Date</label><input id="fFrom" type="date"></div>
        <div><label for="fTo">To Date</label><input id="fTo" type="date"></div>
        <div><label for="fBatch">Batch / Lot</label><input id="fBatch" type="text" placeholder="contains..."></div>
        <div><label for="fSerial">Serial</label><input id="fSerial" type="text" placeholder="contains..."></div>
        <div><label for="fSku">SKU</label><input id="fSku" type="text" list="fSkuList" placeholder="select SKU"></div>
        <div><label for="fLine">Production Line</label>
          <select id="fLine">
            <option value="">All</option>
            <option value="SP">SP</option><option value="PKN">PKN</option>
            <option value="MB-250">MB-250</option><option value="MB-150">MB-150</option>
            <option value="AL">AL</option><option value="Offline Banding">Offline Banding</option>
          </select>
        </div>
        <div><label for="fVoided">Voided</label>
          <select id="fVoided"><option value="all">Include</option><option value="no">Only active</option></select>
        </div>
        <div><label for="fLimit">Limit</label><input id="fLimit" type="number" min="1" max="1000" value="500"></div>
      </div>
      <datalist id="fSkuList"></datalist>
      <div class="actions">
        <button id="btnSearch" class="btn-main" type="button">Search</button>
        <button id="btnClear" class="btn-soft" type="button">Reset</button>
        <button id="btnCsv" class="btn-soft" type="button">Export CSV</button>
      </div>
      <div id="status" class="status"></div>
    </div>

    <div class="card table-wrap">
      <table>
        <thead>
          <tr>
            <th>Created (EAT)</th><th>Serial</th><th>Batch/Lot</th><th>SKU</th><th>Qty</th><th>Line</th>
            <th>Pallet</th><th>Recorded By</th><th>Voided</th><th>Reason</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

  <script src="../config.js"></script>
  <script src="../js/retiflux-auth-session.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    (function() {
      var cfg = window.BANDFLOW_CONFIG || {};
      var supabase = (cfg.SUPABASE_URL && cfg.SUPABASE_ANON_KEY) ? window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY) : null;
      var dataRows = [];

      function getActorUserId() {
        try {
          var rf = window.RetiFluxAuthSession && window.RetiFluxAuthSession.read();
          if (rf && rf.user_id) return rf.user_id;
        } catch (_e) {}
        return '';
      }
      function nowEatDateStr() {
        var eat = new Date(Date.now() + 3 * 60 * 60 * 1000);
        return eat.toISOString().slice(0, 10);
      }
      function fmtEat(iso) {
        if (!iso) return '—';
        var d = new Date(new Date(iso).getTime() + 3 * 60 * 60 * 1000);
        return d.toISOString().slice(0,16).replace('T',' ');
      }
      function esc(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]); });
      }
      function setStatus(t, isErr) {
        var el = document.getElementById('status');
        el.textContent = t || '';
        el.style.color = isErr ? '#f87171' : '#94a3b8';
      }
      async function loadSkus() {
        if (!supabase) return;
        try {
          var res = await supabase.from('skus').select('sku').eq('is_active', true).order('sku');
          if (res.error) return;
          var dl = document.getElementById('fSkuList');
          dl.innerHTML = '';
          (res.data || []).forEach(function(r) {
            var opt = document.createElement('option');
            opt.value = r.sku;
            dl.appendChild(opt);
          });
        } catch (_e) {}
      }
      function renderRows(rows) {
        dataRows = rows || [];
        var tb = document.getElementById('rows');
        tb.innerHTML = '';
        if (!dataRows.length) {
          tb.innerHTML = '<tr><td colspan="10" style="color:#94a3b8;">No tickets found for current filters.</td></tr>';
          return;
        }
        dataRows.forEach(function(r) {
          var tr = document.createElement('tr');
          tr.innerHTML =
            '<td>' + esc(fmtEat(r.created_at)) + '</td>' +
            '<td>' + esc(r.serial || '—') + '</td>' +
            '<td>' + esc(r.batch_lot || '—') + '</td>' +
            '<td>' + esc(r.sku || '—') + '</td>' +
            '<td>' + esc((r.qty || '—') + (r.uom ? (' ' + r.uom) : '')) + '</td>' +
            '<td>' + esc(r.production_line || '—') + '</td>' +
            '<td>' + esc(r.pallet_color || '—') + '</td>' +
            '<td>' + esc(r.recorded_by || '—') + '</td>' +
            '<td class="' + (r.voided ? 'void' : '') + '">' + (r.voided ? 'Yes' : 'No') + '</td>' +
            '<td>' + esc(r.voided_reason || '—') + '</td>';
          tb.appendChild(tr);
        });
      }
      async function runSearch() {
        if (!supabase) { setStatus('Supabase not configured.', true); return; }
        var actor = getActorUserId();
        if (!actor) { setStatus('No signed-in user session found.', true); return; }

        setStatus('Searching...');
        var params = {
          p_actor_user_id: actor,
          p_start_date: document.getElementById('fFrom').value || null,
          p_end_date: document.getElementById('fTo').value || null,
          p_batch_query: (document.getElementById('fBatch').value || '').trim() || null,
          p_serial_query: (document.getElementById('fSerial').value || '').trim() || null,
          p_sku: (document.getElementById('fSku').value || '').trim() || null,
          p_line: (document.getElementById('fLine').value || '').trim() || null,
          p_include_voided: document.getElementById('fVoided').value !== 'no',
          p_limit: Number(document.getElementById('fLimit').value || 500)
        };
        var res = await supabase.rpc('search_tickets_advanced', params);
        if (res.error) { setStatus('Search failed: ' + res.error.message, true); renderRows([]); return; }
        renderRows(res.data || []);
        setStatus('Found ' + (res.data || []).length + ' ticket(s).');
      }
      function resetFilters() {
        var d = nowEatDateStr();
        document.getElementById('fFrom').value = d;
        document.getElementById('fTo').value = d;
        document.getElementById('fBatch').value = '';
        document.getElementById('fSerial').value = '';
        document.getElementById('fSku').value = '';
        document.getElementById('fLine').value = '';
        document.getElementById('fVoided').value = 'all';
        document.getElementById('fLimit').value = '500';
      }
      function exportCsv() {
        if (!dataRows.length) { setStatus('No rows to export.', true); return; }
        var cols = ['created_at','serial','batch_lot','sku','qty','uom','production_line','pallet_color','recorded_by','voided','voided_reason'];
        var lines = [cols.join(',')];
        dataRows.forEach(function(r){
          lines.push(cols.map(function(c){
            var v = r[c];
            var s = String(v == null ? '' : v).replace(/"/g,'""');
            return '"' + s + '"';
          }).join(','));
        });
        var blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'batch-search-' + Date.now() + '.csv';
        a.click();
        URL.revokeObjectURL(a.href);
      }

      document.getElementById('btnSearch').addEventListener('click', runSearch);
      document.getElementById('btnClear').addEventListener('click', function(){ resetFilters(); renderRows([]); setStatus('Filters reset.'); });
      document.getElementById('btnCsv').addEventListener('click', exportCsv);

      resetFilters();
      loadSkus();
      runSearch();
    })();
  </script>
</body>
</html>

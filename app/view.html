<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#667eea">
    <title>RetiFlux™ PRT - View Ticket</title>
    <link rel="icon" href="../favicon.png" type="image/png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        iframe { display: block; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe id="app" src="" title="PRT View"></iframe>
    <script>
        (function() {
            var p = new URLSearchParams(window.location.search);
            var s = p.get('serial');
            // Never forward geofence/bypass into the iframe — URL tokens must not skip GPS (see js/retiflux-geofence.js).
            var q = s ? ('serial=' + encodeURIComponent(s)) : '';
            document.getElementById('app').src = 'ticket-view.html' + (q ? ('?' + q) : '');
            try {
                if (s && window.history && window.history.replaceState) {
                    window.history.replaceState(null, '', window.location.pathname + '?serial=' + encodeURIComponent(s));
                }
            } catch (e) {}
        })();
    </script>
</body>
</html>

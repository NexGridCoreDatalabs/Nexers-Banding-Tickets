<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <title>RetiFlux™ - Redirecting...</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <script>
        (function() {
            var p = new URLSearchParams(window.location.search);
            var mode = p.get('mode');
            var serial = p.get('serial');
            var tab = p.get('tab');
            var bypass = (p.get('geofence') === 'bypass' && p.get('t') === 'BIDCO_BYPASS') ? 'geofence=bypass&t=BIDCO_BYPASS' : '';
            var parts = [];
            if (bypass) parts.push(bypass);
            if (serial) parts.push('serial=' + encodeURIComponent(serial));
            if (tab) parts.push('tab=' + encodeURIComponent(tab));
            var q = parts.join('&');
            var inFrame = window.self !== window.top;
            var target;
            if (!mode) {
                target = 'bandingtickets-full.html' + (bypass ? '?' + bypass : '');
            } else if (inFrame) {
                parts.unshift('mode=' + mode);
                target = 'bandingtickets-full.html?' + parts.join('&');
            } else {
                var page = mode === 'fill' ? 'fill' : mode === 'view' ? 'view' : mode === 'edit' ? 'edit' : mode === 'movement' ? 'movement' : 'bincards';
                target = 'app/' + page + '.html' + (q ? '?' + q : '');
            }
            window.location.replace(target);
        })();
    </script>
</head>
<body>
    <p style="font-family:system-ui;text-align:center;padding:40px;color:#94a3b8;">Redirecting...</p>
</body>
</html>

# RetiFlux™ — Supabase Configuration
# Tuned for 250+ concurrent users, maximum security
# https://supabase.com/docs/guides/local-development/cli/config

project_id = "retiflux"

# ─────────────────────────────────────────────────────────────────────────────
# API — tuned for warehouse dashboard load
# ─────────────────────────────────────────────────────────────────────────────
[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
# Limit payload size; use pagination for large lists
max_rows = 500

# ─────────────────────────────────────────────────────────────────────────────
# DATABASE — connection pooling for 250+ concurrent users
# ─────────────────────────────────────────────────────────────────────────────
[db]
port = 54322
shadow_port = 54320
health_timeout = "2m"
major_version = 17

# Pooler: CRITICAL for 250+ users — transaction mode, high connection limits
[db.pooler]
enabled = true
port = 54329
pool_mode = "transaction"
default_pool_size = 50
max_client_conn = 300

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = true
sql_paths = ["./seed/001_zone_config.sql", "./seed/002_zone_transitions.sql"]

# Network restrictions — tighten in production
[db.network_restrictions]
enabled = false
allowed_cidrs = ["0.0.0.0/0"]
allowed_cidrs_v6 = ["::/0"]

# ─────────────────────────────────────────────────────────────────────────────
# REALTIME — zone overview, movement feed
# ─────────────────────────────────────────────────────────────────────────────
[realtime]
enabled = true

# ─────────────────────────────────────────────────────────────────────────────
# STUDIO — local dev UI
# ─────────────────────────────────────────────────────────────────────────────
[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

# ─────────────────────────────────────────────────────────────────────────────
# AUTH — security hardened
# ─────────────────────────────────────────────────────────────────────────────
[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
# Shorter JWT expiry for security (15 min)
jwt_expiry = 900
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 8
# Require mixed case + digits
password_requirements = "lower_upper_letters_digits"

[auth.rate_limit]
email_sent = 2
sms_sent = 30
anonymous_users = 30
token_refresh = 150
sign_in_sign_ups = 30
token_verifications = 30

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = true
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

[auth.sms]
enable_signup = false
enable_confirmations = false
template = "Your code is {{ .Code }}"
max_frequency = "5s"

# ─────────────────────────────────────────────────────────────────────────────
# STORAGE — proof of loading, pallet photos
# ─────────────────────────────────────────────────────────────────────────────
[storage]
enabled = true
file_size_limit = "50MiB"

[storage.s3_protocol]
enabled = true

# ─────────────────────────────────────────────────────────────────────────────
# INBUCKET — email testing (local only)
# ─────────────────────────────────────────────────────────────────────────────
[inbucket]
enabled = true
port = 54324

# ─────────────────────────────────────────────────────────────────────────────
# EDGE RUNTIME — for future Edge Functions
# ─────────────────────────────────────────────────────────────────────────────
[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083
deno_version = 2
